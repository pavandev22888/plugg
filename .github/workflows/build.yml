name: Build PlugHub

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Use Node.js
      uses: actions/setup-node@v4
      with:
        node-version: lts/*

    - name: Install dependencies
      run: npm install

    - name: Build React app
      run: npm run build

    - name: Upload Build Artifacts
      uses: actions/upload-artifact@v4
      with:
        name: PlugHub-Build
        path: dist/

    - name: Build Electron (try)
      run: npm run electron-build
      env:
        CSC_IDENTITY_AUTO_DISCOVERY: false
      continue-on-error: true

    - name: Upload EXE if available
      uses: actions/upload-artifact@v4
      if: hashFiles('dist/**/*.exe') != ''
      with:
        name: PlugHub-EXE
        path: dist/**/*.exe
